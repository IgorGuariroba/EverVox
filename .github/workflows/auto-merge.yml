name: Auto-merge

# Liga o auto-merge (squash) em todo PR contra main assim que ele é aberto
# ou atualizado: o GitHub mescla sozinho quando o check obrigatório `ci`
# (ver ci.yml e o ruleset "protect-main") ficar verde — sem isso, mesmo com
# checks verdes o PR fica parado até alguém clicar em "Merge" manualmente.
#
# Usa o PAT AUTO_MERGE_PAT (fine-grained, Contents + Pull requests em
# read/write) em vez do GITHUB_TOKEN de propósito: merge armado com o
# GITHUB_TOKEN sai atribuído ao github-actions[bot], e o push resultante
# na main não dispara workflow nenhum (anti-recursão do Actions) — nem o
# ci de push, nem o Release que publica o .deb (ver release.yml).
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Habilitar auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        # Idempotente nos casos benignos — já armado (ex.: evento
        # "synchronize" após um push extra) ou PR já mesclável (o GitHub
        # rejeita armar auto-merge nesse estado; aí mescla direto). Erros
        # reais (ex.: PAT inválido, 401) DERRUBAM o job: um `|| true` aqui
        # já escondeu um token quebrado com o job verde e PRs parados.
        run: |
          if [ "$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')" = "true" ]; then
            echo "Auto-merge já armado — nada a fazer."
            exit 0
          fi
          if gh pr merge --auto --squash "$PR_URL"; then
            exit 0
          fi
          if [ "$(gh pr view "$PR_URL" --json mergeStateStatus --jq .mergeStateStatus)" = "CLEAN" ]; then
            echo "PR já mesclável (checks verdes): mesclando direto."
            exec gh pr merge --squash "$PR_URL"
          fi
          echo "erro: não foi possível armar o auto-merge — verifique o token AUTO_MERGE_PAT." >&2
          exit 1
