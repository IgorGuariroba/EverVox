name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Execução diária só do job e2e: acumula histórico de estabilidade para
  # promovê-lo a bloqueante (critério: ~10-15 execuções consecutivas verdes,
  # ver issue #24), mesmo em semanas sem PRs.
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC = 06:00 BRT

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ci
    # O agendamento diário existe só para o e2e; o ci roda em push/PR.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências de sistema (ALSA para cpal; cmake/clang para whisper-rs)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev cmake libclang-dev

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache de dependências
        uses: Swatinem/rust-cache@v2

      - name: Formatação
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Testes
        run: cargo test --workspace

      - name: Extensão GNOME (sintaxe JS + metadata.json)
        run: |
          for arquivo in gnome-extension/*.js; do
            node --input-type=module --check <"$arquivo"
          done
          python3 -c "import json; json.load(open('gnome-extension/metadata.json'))"

      - name: Build
        run: cargo build --workspace --release

      - name: Scripts shell (sintaxe + shellcheck)
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh
          fi

  # ── E2E: pipeline de Ditado ponta a ponta em ambiente headless ──────────
  # Job separado e NÃO-bloqueante: falha aqui não trava o merge.
  # Promover a bloqueante só depois de estabilizar por algumas semanas
  # (ver issue #24).
  e2e:
    name: e2e (pipeline headless)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências de sistema (PipeWire, sway, STT, áudio)
        run: |
          sudo apt-get update
          # pipewire-alsa é essencial: roteia o device ALSA "default" (que o
          # cpal do Daemon abre) para o PipeWire — sem ele o microfone
          # virtual nunca é visto e o Toggle falha com "microfone indisponível".
          sudo apt-get install -y \
            pipewire pipewire-alsa wireplumber pipewire-pulse pulseaudio-utils \
            sway wl-clipboard \
            dbus-daemon \
            libespeak-ng1 python3 \
            libcanberra0 \
            cmake libclang-dev pkg-config libasound2-dev \
            curl

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de dependências (Rust)
        uses: Swatinem/rust-cache@v2

      - name: Cache do modelo whisper (base)
        uses: actions/cache@v4
        with:
          path: ~/.cache/evervox-e2e
          key: evervox-whisper-base-v1

      # O dbus-daemon no ubuntu-latest pode estar ausente (dbus-user-session
      # substituiu). Garantimos que está disponível.
      - name: Garantir dbus-daemon de sessão
        run: |
          if ! command -v dbus-daemon >/dev/null 2>&1; then
            sudo apt-get install -y dbus-x11
          fi

      # Estágio 3 do E2E (colar simulado): o Daemon precisa criar um teclado
      # virtual em /dev/uinput e o leitor de eventos precisa ler o
      # /dev/input/event* resultante. Sem estas permissões o estágio degrada
      # para "pulado" — com elas, é exercitado de verdade.
      - name: Permissões de uinput e eventos de input (estágio 3)
        run: |
          sudo modprobe uinput
          {
            echo 'KERNEL=="uinput", MODE="0666"'
            echo 'KERNEL=="event*", SUBSYSTEM=="input", MODE="0666"'
          } | sudo tee /etc/udev/rules.d/99-evervox-e2e.rules >/dev/null
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      - name: E2E
        run: ./scripts/e2e.sh
        env:
          EVERVOX_TIMEOUT_DAEMON: '120'
          EVERVOX_TIMEOUT_DITADO: '60'
