name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências de sistema (ALSA para cpal; cmake/clang para whisper-rs)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev cmake libclang-dev

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache de dependências
        uses: Swatinem/rust-cache@v2

      - name: Formatação
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Testes
        run: cargo test --workspace

      - name: Extensão GNOME (sintaxe JS + metadata.json)
        run: |
          for arquivo in gnome-extension/*.js; do
            node --input-type=module --check <"$arquivo"
          done
          python3 -c "import json; json.load(open('gnome-extension/metadata.json'))"

      - name: Build
        run: cargo build --workspace --release
