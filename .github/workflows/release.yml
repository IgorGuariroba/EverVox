name: Release

# Publica o pacote .deb automaticamente quando a versão do crate muda na
# main: cada push compara `v<versão>` (crates/daemon/Cargo.toml) com as
# tags existentes e, se for inédita, gera o pacote via
# scripts/empacotar-deb.sh e cria o release com o .deb anexado e notas
# geradas dos PRs — o próprio `gh release create` cria a tag no commit,
# num único workflow (tag empurrada com GITHUB_TOKEN não dispararia um
# workflow de release separado, por design do GitHub Actions).
#
# Fluxo de release: suba a versão nos Cargo.toml dos crates num PR; o
# merge na main cuida do resto (tag, .deb e release).
on:
  push:
    branches: [main]
  # Válvula de escape enquanto o auto-merge usa o GITHUB_TOKEN: o merge
  # feito pelo bot não gera evento de push que dispare workflows, então o
  # release pode ser acionado à mão (gh workflow run Release) — a checagem
  # de versão inédita vale igual.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: release (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decidir se há versão nova para publicar
        id: versao
        run: |
          versao="$(sed -n 's/^version = "\(.*\)"$/\1/p' crates/daemon/Cargo.toml | head -1)"
          if [ -z "$versao" ]; then
            echo "erro: não achei a versão em crates/daemon/Cargo.toml." >&2
            exit 1
          fi
          tag="v$versao"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag já existe — nada a publicar."
            echo "publicar=false" >>"$GITHUB_OUTPUT"
          else
            echo "Versão nova ($tag): publicando release."
            echo "publicar=true" >>"$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"

      - name: Instalar dependências de sistema (ALSA para cpal; cmake/clang para whisper-rs)
        if: steps.versao.outputs.publicar == 'true'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev cmake libclang-dev

      - name: Instalar toolchain Rust
        if: steps.versao.outputs.publicar == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de dependências
        if: steps.versao.outputs.publicar == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Instalar cargo-deb
        if: steps.versao.outputs.publicar == 'true'
        run: cargo install cargo-deb --locked

      - name: Gerar o .deb
        if: steps.versao.outputs.publicar == 'true'
        run: ./scripts/empacotar-deb.sh

      - name: Criar tag e release com o .deb anexado
        if: steps.versao.outputs.publicar == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.versao.outputs.tag }}" target/debian/*.deb \
            --target "$GITHUB_SHA" \
            --title "EverVox ${{ steps.versao.outputs.tag }}" \
            --generate-notes
